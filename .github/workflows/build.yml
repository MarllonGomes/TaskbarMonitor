name: Build

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: the build only needs to read the repo. No write scope is
# granted to GITHUB_TOKEN, limiting the blast radius of a poisoned build step.
permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish (framework-dependent)
        run: dotnet publish TaskbarMonitor.csproj -c Release -r win-x64 --self-contained false -o dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TaskbarMonitor-win-x64
          path: dist

  installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install Inno Setup
        # Pin the version so a poisoned/updated package can't silently change
        # the tool that compiles the elevated installer.
        run: choco install innosetup --version=6.3.3 -y --no-progress

      - name: Build installer
        run: powershell -NoProfile -ExecutionPolicy Bypass -File installer\build-installer.ps1

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: TaskbarMonitor-Setup
          path: installer/output/*.exe
