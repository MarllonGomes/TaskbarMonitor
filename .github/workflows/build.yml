name: Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish (framework-dependent)
        run: dotnet publish TaskbarMonitor.csproj -c Release -r win-x64 --self-contained false -o dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TaskbarMonitor-win-x64
          path: dist

  installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        run: powershell -NoProfile -ExecutionPolicy Bypass -File installer\build-installer.ps1

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: TaskbarMonitor-Setup
          path: installer/output/*.exe
